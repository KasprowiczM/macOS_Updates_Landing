      <h1>macOS Updates — One-command updater for Apple Silicon Macs</h1>
      <p>
        macOS Updates keeps macOS, App Store apps, Homebrew, native CLI/npm tooling, and 40+ internet-downloaded apps current.
        It builds APPLICATIONS.md from the current Mac and updates only software already installed.
      </p>
      <p>Install in one line:</p>
      <pre><code>/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/KasprowiczM/macOS_updates/main/install.sh)"</code></pre>
      <ul>
        <li>Seven-step update pipeline: prescan, macOS, App Store, CLI/npm, Homebrew, internet apps, postupdate.</li>
        <li>Apple Silicon only, macOS 13+, Bash 3.2-compatible.</li>
        <li>Optional dev_sync private overlay for inventory, history, preferences, and secrets.</li>
        <li>Dry-run and coverage reporting before applying updates.</li>
      </ul>
